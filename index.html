<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wellness Matrix | Qatar A-Z</title>
    <style>
        :root { --primary: #0f172a; --teal: #0d9488; --red: #be123c; }
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-family: serif; }
        .map-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 400px; margin-bottom: 20px; }
        iframe { border-radius: 15px; border: 1px solid #ddd; width: 100%; height: 100%; }
        .loc-list { overflow-y: auto; background: #f8fafc; border-radius: 15px; padding: 10px; border: 1px solid #ddd; }
        .loc-btn { padding: 10px; margin: 5px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #eee; font-size: 14px; }
        .loc-btn:hover { background: #f0fdfa; border-color: var(--teal); }
        .search-input { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid #ddd; margin-bottom: 20px; box-sizing: border-box; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .result-table th { background: #f8fafc; text-align: left; padding: 10px; font-size: 12px; color: #666; }
        .result-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .brand-card { background: #f0fdfa; padding: 12px; border-radius: 10px; border: 1px solid #ccfbf1; margin-top: 5px; }
        footer { text-align: center; color: var(--red); font-size: 12px; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>The Wellness Matrix</h1>
    <div class="map-box">
        <iframe id="qMap" src="https://maps.google.com/?cid=2088131802046349362&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ"></iframe>
        <div class="loc-list" id="lList"></div>
    </div>
    <input type="text" id="sIn" class="search-input" placeholder="Search Disease or Brand (e.g. Asthma, Ventolin)..." list="opts">
    <datalist id="opts"></datalist>
    <div id="res"></div>
    <footer>⚠️ DISCLAIMER: EDUCATIONAL PURPOSES ONLY. CONSULT A DOCTOR. EMERGENCY: 999.</footer>
</div>

<script>
    const locs = ["Lusail Boulevard", "Place Vendôme Mall", "Al Maha Island", "Crescent Park", "Lusail Marina", "Souq Waqif", "Katara Village", "Msheireb Downtown", "MIA Park", "The Pearl-Qatar", "Villaggio Mall", "Aspire Park", "Al Bidda Park", "Doha Festival City", "Doha Corniche", "Inland Sea Qatar", "Oxygen Park", "5/6 Park"];
    
    const db = [
        { n: "Alzheimer's", b: "Aricept, Exelon", d: "5mg-10mg", t: "Take at Bedtime", a: "Doha Festival City, Lusail" },
        { n: "Asthma", b: "Ventolin, Symbicort", d: "1-2 Puffs", t: "Morning / As Needed", a: "Villaggio, Souq Waqif, Vendôme" },
        { n: "Diabetes", b: "Glucophage, Lantus", d: "500mg", t: "With Meals", a: "All 18 Mall Locations" },
        { n: "Hypertension", b: "Exforge, Concor", d: "5mg-10mg", t: "Morning", a: "Lusail, Msheireb, The Pearl" },
        { n: "Migraine", b: "Imigran, Panadol Migraine", d: "50mg", t: "At onset of pain", a: "All 18 Locations" }
    ];

    const lList = document.getElementById('lList');
    locs.forEach(l => {
        const d = document.createElement('div');
        d.className = 'loc-btn'; d.innerText = l;
        d.onclick = () => document.getElementById('qMap').src = `https://maps.google.com/maps?q=${encodeURIComponent(l + ', Qatar')}&output=embed`;
        lList.appendChild(d);
    });

    const sIn = document.getElementById('sIn');
    const opts = document.getElementById('opts');
    sIn.oninput = () => {
        const v = sIn.value.toLowerCase();
        opts.innerHTML = "";
        db.forEach(i => { if(i.n.toLowerCase().includes(v) || i.b.toLowerCase().includes(v)) { const o = document.createElement('option'); o.value = i.n; opts.appendChild(o); }});
        const m = db.find(i => i.n === sIn.value || i.b.includes(sIn.value));
        if(m) {
            document.getElementById('res').innerHTML = `
                <table class="result-table">
                    <thead><tr><th>Condition</th><th>Usage & Availability</th></tr></thead>
                    <tbody><tr>
                        <td><b>${m.n}</b></td>
                        <td><div class="brand-card"><b>Brands:</b> ${m.b}<br><b>Dose:</b> ${m.d} | <b>Time:</b> ${m.t}</div>
                        <p style="font-size:12px;">📍 Available near: ${m.a}</p></td>
                    </tr></tbody>
                </table>`;
        }
    };
</script>
</body>
</html>
