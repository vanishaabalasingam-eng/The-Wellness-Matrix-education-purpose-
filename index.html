<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wellness Matrix | Qatar A-Z</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --matrix-teal: #0d9488;
            --warning-red: #be123c;
            --bg-gray: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gray);
            margin: 0; padding: 20px; color: var(--primary);
        }

        .matrix-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; }

        .map-section {
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;
            margin-bottom: 30px; height: 450px;
        }

        .map-container { border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; background: #cbd5e1; }
        .location-list { background: #f8fafc; padding: 15px; border-radius: 20px; overflow-y: auto; border: 1px solid #e2e8f0; }

        .loc-item {
            padding: 10px 15px; margin-bottom: 8px; background: white;
            border-radius: 10px; cursor: pointer; font-size: 0.8rem;
            border: 1px solid transparent; transition: 0.2s;
        }
        .loc-item:hover { border-color: var(--matrix-teal); background: #f0fdfa; }
        .loc-item.active { border-color: var(--matrix-teal); background: #f0fdfa; font-weight: 700; }

        .search-area { text-align: center; margin-bottom: 25px; }
        .search-input {
            width: 100%; max-width: 700px; padding: 18px 25px; border-radius: 50px;
            border: 2px solid #e2e8f0; font-size: 1rem; outline: none;
        }

        .result-box { margin-top: 20px; animation: fadeIn 0.4s ease; }
        .matrix-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; border: 1px solid #f1f5f9; }
        .matrix-table th { background: #f8fafc; padding: 12px; text-align: left; font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        .matrix-table td { padding: 20px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }

        .symp-badge { display: inline-block; background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; margin: 2px; font-weight: 600; }
        .brand-info { background: #f0fdfa; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #ccfbf1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; color: var(--warning-red); font-size: 0.7rem; font-weight: 700; margin-top: 30px; }
    </style>
</head>
<body>

<div class="matrix-container">
    <header><h1>The Wellness Matrix</h1></header>

    <div class="map-section">
        <div class="map-container">
            <iframe id="qatarMap" width="100%" height="100%" frameborder="0" style="border:0" 
                src="https://www.google.com/maps?q=$?q=Qatar&output=embed" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="location-list">
            <h4 style="margin:0 0 12px 0; color:var(--matrix-teal);">📍 18 Qatar Landmarks</h4>
            <div id="landmarkContainer"></div>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" class="search-input" 
               placeholder="Search Disease, Medicine, or Brand (Auto-Populate)..." 
               list="dynamicOptions">
        <datalist id="dynamicOptions"></datalist>
    </div>

    <div id="tableTarget" class="result-box"></div>

    <footer>⚠️ CONSULT A MEDICAL PROFESSIONAL BEFORE USE. EMERGENCY: DIAL 999.</footer>
</div>

<script>
    const landmarks = [
        "Lusail Boulevard", "Place Vendôme Mall", "Al Maha Island", "Crescent Park", 
        "Lusail Marina", "Souq Waqif", "Katara Cultural Village", "Msheireb Downtown Doha", 
        "Museum of Islamic Art Park", "The Pearl-Qatar", "Villaggio Mall", "Aspire Park", 
        "Al Bidda Park", "Doha Festival City", "Doha Corniche", "Inland Sea Qatar", 
        "Oxygen Park", "5/6 Park"
    ];

    const database = [
        { condition: "Alzheimer’s", symptoms: ["Memory loss", "Confusion"], brands: "Aricept, Exelon", dosage: "5mg - 10mg", timing: "Take at Bedtime", access: "Doha Festival City, Lusail Boulevard" },
        { condition: "Asthma", symptoms: ["Wheezing", "Cough"], brands: "Ventolin, Symbicort", dosage: "1-2 puffs", timing: "As needed / Morning", access: "Villaggio Mall, Souq Waqif, Place Vendôme, Corniche" },
        { condition: "ADHD", symptoms: ["Impulsivity", "Inattention"], brands: "Concerta, Ritalin", dosage: "18mg - 36mg", timing: "Morning (avoid evening)", access: "Doha Festival City, Villaggio Mall" },
        { condition: "Diabetes", symptoms: ["Thirst", "Blurred vision"], brands: "Glucophage (Metformin), Janumet", dosage: "500mg - 1000mg", timing: "With or after Meals", access: "All Major Malls (Villaggio, Vendôme, DFC)" },
        { condition: "Eczema", symptoms: ["Itching", "Red patches"], brands: "Elica, Hydrocortisone", dosage: "Thin layer", timing: "After bathing / Before bed", access: "The Pearl, Souq Waqif, 5/6 Park" },
        { condition: "Hypertension", symptoms: ["Dizziness", "Headache"], brands: "Exforge, Concor", dosage: "5mg - 10mg", timing: "Consistent Morning time", access: "Lusail Boulevard, Msheireb Downtown" },
        { condition: "Migraine", symptoms: ["Pulsating pain", "Nausea"], brands: "Imigran, Solpadiene", dosage: "50mg at onset", timing: "At first sign of Aura/Pain", access: "All Landmark Pharmacies" },
        { condition: "Reflux (GERD)", symptoms: ["Heartburn", "Acid reflux"], brands: "Nexium, Gaviscon", dosage: "20mg - 40mg", timing: "30 mins Before Breakfast", access: "Souq Waqif, The Pearl, Villaggio" },
        { condition: "Thyroid (Hypo)", symptoms: ["Fatigue", "Weight gain"], brands: "Euthyrox, Thyroxin", dosage: "25mcg - 100mcg", timing: "Empty stomach (1hr before food)", access: "Place Vendôme, Doha Festival City" }
    ];

    const map = document.getElementById('qatarMap');
    const container = document.getElementById('landmarkContainer');

    // Sidebar & Map Navigation
    landmarks.forEach(loc => {
        const div = document.createElement('div');
        div.className = 'loc-item';
        div.innerText = loc;
        div.onclick = function() {
            document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            map.src = `https://www.google.com/maps?q=$?q=${encodeURIComponent(loc + ', Qatar')}&output=embed`;
        };
        container.appendChild(div);
    });

    // Omni-Search & Instant Render
    const input = document.getElementById('searchInput');
    const datalist = document.getElementById('dynamicOptions');
    const target = document.getElementById('tableTarget');

    input.addEventListener('input', function() {
        const val = this.value;
        const lowVal = val.toLowerCase();
        if (val === "") { target.innerHTML = ""; return; }

        datalist.innerHTML = "";
        const suggestions = new Set();
        database.forEach(item => {
            if (item.condition.toLowerCase().includes(lowVal)) suggestions.add(item.condition);
            item.brands.split(', ').forEach(b => { if (b.toLowerCase().includes(lowVal)) suggestions.add(b); });
        });
        suggestions.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            datalist.appendChild(opt);
        });

        const match = database.find(i => i.condition === val || i.brands.split(', ').some(b => b === val));
        if (match) {
            const sTags = match.symptoms.map(s => `<span class="symp-badge">${s}</span>`).join('');
            target.innerHTML = `
                <table class="matrix-table">
                    <thead><tr><th>Condition</th><th>Usage & Availability</th></tr></thead>
                    <tbody>
                        <tr>
                            <td style="font-weight:700; width: 180px; font-size:1.1rem; color:var(--primary);">${match.condition}</td>
                            <td>
                                <div>${sTags}</div>
                                <div class="brand-info">
                                    <b style="color:var(--matrix-teal)">Medicines:</b> ${match.brands}<br>
                                    <b>Dosage:</b> ${match.dosage} | <b>Best Time:</b> ${match.timing}
                                </div>
                                <div style="margin-top:12px; font-size:0.85rem; color:#475569;">
                                    <b>📍 Available Near:</b> ${match.access}
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>`;
        }
    });
</script>
</body>
</html>
